services:
  ai-stock-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-stock-dashboard:latest
    container_name: ai-stock-dashboard
    restart: unless-stopped
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    ports:
      - "${APP_PORT:-8507}:8507"
    environment:
      APP_PORT: "8507"
      STREAMLIT_SERVER_PORT: "8507"
      STREAMLIT_SERVER_ADDRESS: "0.0.0.0"
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_BROWSER_GATHER_USAGE_STATS: "false"
      PYTHONUNBUFFERED: "1"
      PYTEST_ADDOPTS: "-o cache_dir=/tmp/pytest_cache"
      AI_STOCK_MARKET_CACHE_DIR: "/app/runtime/market_cache"
    volumes:
      - ./docker_runtime:/app/runtime
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8507/_stcore/health', timeout=5).read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
